name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Terraform Lint (TFLint)
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Préparer le dossier de rapports
        run: mkdir -p reports

      - name: Lancer TFlint
        run: |
          set -o pipefail
          tflint --init
          tflint --recursive --format compact | tee reports/tflint-raw.txt

      - name: Formater le rapport en Markdown
        if: always()
        run: |
          {
            echo "# Rapport TFLint"
            echo
            echo "_Généré le $(date)_"
            echo
            echo '```'
            cat reports/tflint-raw.txt
            echo '```'
          } > reports/tflint-report.md

      - name: Conserver le rapport TFLint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tflint-report
          path: reports/tflint-report.md

  secrets:
    name: Détection de secrets (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # requis pour publier le SARIF dans l'onglet Security
    steps:
      - name: Récupérer le code (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Préparer le dossier de rapports
        run: mkdir -p reports

      - name: Lancer Gitleaks
        run: |
          set -o pipefail
          docker run --rm -v "$PWD:/repo" -w /repo ghcr.io/gitleaks/gitleaks:latest detect --source . --report-format sarif --report-path reports/gitleaks.sarif --exit-code 0 -redact -v | tee reports/gitleaks-report.txt

      - name: Conserver les rapports Gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleak-report
          path: reports/

      - name: Publier les findings Gitleaks dans Security
        if: always() && hashFiles('reports/gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/gitleaks.sarif
          category: gitleaks

  security:
    name: Analyse de sécurité IaC (Checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # requis pour publier le SARIF dans l'onglet Security
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Préparer le dossier de rapports
        run: mkdir -p reports

      - name: Lancer Checkrov
        run: |
          set -o pipefail
          docker run --rm -v "$PWD:/tf" -w /tf bridgecrew/checkov --directory terraform/aws --output cli --output sarif --output-file-path console,reports/checkov.sarif --soft-fail | tee reports/checkov-report.txt

      - name: Conserver les rapports Checkov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: reports/

      - name: Publier les findings Checkov dans Security
        if: always() && hashFiles('reports/checkov.sarif', 'reports/checkov.sarif/**') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          # Checkov écrit le SARIF dans reports/checkov.sarif (dossier) → upload-sarif
          # y retrouve récursivement le fichier results_sarif.sarif.
          sarif_file: reports/checkov.sarif
          category: checkov

  deploy:
    name: Déploiement LocalStack (S3/IAM/KMS/ECR/EC2)
    runs-on: ubuntu-latest
    needs: [lint, secrets, security]

    # LocalStack tourne comme service à côté du job, sur le port 4566.
    services:
      localstack:
        # Tag épinglé sur une version Community (sans LOCALSTACK_AUTH_TOKEN) :
        # le tag :latest exige désormais une licence/token et refuse de démarrer.
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: s3,iam,kms,ecr,ec2

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Installer tflocal + awslocal
        run: pip install terraform-local awscli-local

      - name: Préparer le dossier de rapports
        run: mkdir -p reports

      # tflocal injecte tout seul les endpoints LocalStack + des credentials factices.
      - name: Déployer sur LocalStack (apply ciblé)
        working-directory: terraform/aws
        env:
          TF_LOG: INFO   # montre chaque appel API → révèle où ça coince
        run: |
          set -o pipefail
          tflocal init

          # --- Diagnostic : LocalStack répond-il vraiment ? ---
          echo "### Health LocalStack ###"
          curl -s http://localhost:4566/_localstack/health | head -c 2000 || true
          echo
          echo "### Test STS (data.aws_caller_identity) ###"
          timeout 30 awslocal sts get-caller-identity || echo "STS KO/timeout"
          echo "### Test S3 ###"
          timeout 30 awslocal s3 ls || echo "S3 KO/timeout"

          # --- Phase 1 : ressources rapides et 100% supportées (S3/IAM/KMS/ECR) ---
          timeout 300 tflocal apply -auto-approve \
            -target=aws_s3_bucket.data \
            -target=aws_s3_bucket.financials \
            -target=aws_s3_bucket.operations \
            -target=aws_s3_bucket.data_science \
            -target=aws_s3_bucket.logs \
            -target=aws_s3_bucket_object.data_object \
            -target=aws_s3_bucket_public_access_block.data \
            -target=aws_s3_bucket_public_access_block.financials \
            -target=aws_s3_bucket_public_access_block.operations \
            -target=aws_s3_bucket_public_access_block.data_science \
            -target=aws_s3_bucket_public_access_block.logs \
            -target=aws_kms_key.logs_key \
            -target=aws_kms_alias.logs_key_alias \
            -target=aws_iam_user.user \
            -target=aws_iam_access_key.user \
            -target=aws_iam_user_policy.userpolicy \
            -target=aws_ecr_repository.repository \
            | tee ../../reports/localstack-apply.txt

          # --- Phase 2 : EC2, borné à 4 min (LocalStack Community ne fait pas
          # toujours passer l'instance en "running"). On NE casse PAS le job si ça
          # dépasse : la démo reste verte avec S3/IAM/KMS/ECR déjà créés.
          timeout 240 tflocal apply -auto-approve \
            -target=aws_instance.web_host \
            -target=aws_ebs_volume.web_host_storage \
            -target=aws_volume_attachment.ebs_att \
            -target=aws_network_interface.web-eni \
            2>&1 | tee -a ../../reports/localstack-apply.txt \
          || echo "EC2 non créé dans le délai imparti (limite LocalStack Community) — non bloquant." \
               | tee -a ../../reports/localstack-apply.txt

      - name: Vérifier les ressources créées
        run: |
          set -o pipefail
          {
            echo "## Buckets S3"   ; awslocal s3 ls
            echo "## Clés KMS"     ; awslocal kms list-keys
            echo "## Utilisateurs IAM"; awslocal iam list-users
            echo "## Dépôts ECR"   ; awslocal ecr describe-repositories
            echo "## Instances EC2"; awslocal ec2 describe-instances --query 'Reservations[].Instances[].InstanceId'
          } | tee reports/localstack-verify.txt

      - name: Conserver les rapports LocalStack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: localstack-deploy-report
          path: reports/

  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Générer et commiter la doc Terraform
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: terraform/aws
          output-file: README.md
          output-method: inject
          git-push: true
          git-commit-message: "docs(terraform): mise à jour auto de la doc [skip ci]"

  report:
    name: Rapport de sécurité consolidé
    runs-on: ubuntu-latest
    needs: [secrets, security, docs]   # docs pousse aussi : on sérialise pour éviter les conflits de git push
    if: always()   # on veut le rapport même si un scan a trouvé des findings
    permissions:
      contents: write   # requis pour commiter le rapport dans le repo
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Récupérer les artefacts des scans
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Agréger les SARIF en un rapport Markdown trié par criticité
        run: |
          set -o pipefail
          mkdir -p reports

          # 1) Extraire chaque finding de tous les SARIF en TSV :
          #    outil | règle | niveau SARIF | fichier | ligne | message
          : > findings.tsv
          while IFS= read -r f; do
            jq -r '
              .runs[] as $run
              | ($run.tool.driver.name // "inconnu") as $tool
              | $run.results[]?
              | [
                  $tool,
                  (.ruleId // "-"),
                  (.level // "warning"),
                  (.locations[0].physicalLocation.artifactLocation.uri // "-"),
                  (.locations[0].physicalLocation.region.startLine // "-" | tostring),
                  ((.message.text // "-") | gsub("[\n|]"; " "))
                ] | @tsv
            ' "$f" >> findings.tsv
          done < <(find artifacts -name '*.sarif')

          # 2) Mapper le niveau SARIF -> criticité + rang de tri (CRITICAL d'abord)
          {
            echo "# Rapport de sécurité consolidé"
            echo
            echo "_Généré le $(date -u) — agrégation Checkov + Gitleaks (SARIF)._"
            echo
            total=$(wc -l < findings.tsv | tr -d ' ')
            echo "**Total de findings : ${total}**"
            echo
            echo "| Criticité | Outil | Règle | Fichier | Ligne | Détail |"
            echo "|-----------|-------|-------|---------|:-----:|--------|"
            awk -F'\t' '{
              lvl=$3;
              if (lvl=="error")      { sev="HIGH";   rank=1 }
              else if (lvl=="warning"){ sev="MEDIUM"; rank=2 }
              else if (lvl=="note")  { sev="LOW";    rank=3 }
              else                   { sev="INFO";   rank=4 }
              printf "%d\t| %s | %s | `%s` | `%s` | %s | %s |\n", rank, sev, $1, $2, $4, $5, $6
            }' findings.tsv | sort -n | cut -f2-
          } > SECURITY-REPORT.md

          cat SECURITY-REPORT.md

      - name: Conserver le rapport consolidé
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: SECURITY-REPORT.md

      - name: Ajouter le rapport au résumé du run
        if: always()
        run: cat SECURITY-REPORT.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commiter le rapport dans le repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SECURITY-REPORT.md
          if git diff --cached --quiet; then
            echo "Aucun changement dans le rapport, rien à commiter."
          else
            git commit -m "docs(security): mise à jour du rapport de sécurité consolidé [skip ci]"
            git pull --rebase   # docs a pu pousser un commit entre-temps → on se remet à jour
            git push
          fi
